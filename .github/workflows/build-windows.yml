name: Build Windows

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pcre
            mingw-w64-x86_64-zlib
            make
            autoconf
            automake
            libtool
            pkg-config
            git


      - name: Compile OpenSSL
        run: |
          where curl
          curl -O "https://github.com/openssl/openssl/releases/download/OpenSSL_1_0_1e/openssl-1.0.1e.tar.gz"
          tar zxf openssl-1.0.1e.tar.gz
          cd openssl-1.0.1e
          ./config --prefix="$HOME/prebuilt" --openssldir="$HOME/prebuilt/openssl"
          make && make install
          git status


      - name: Configure and Build
        run: |
          pwd
          ./autogen.sh
          ./configure --disable-documentation CFLAGS="-g -O2 -Wno-error"
          make -j$(nproc)

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          # Copy all built executables
          cp src/*.exe artifacts/
          # Copy required MinGW runtime DLLs for each exe
          for exe in artifacts/*.exe; do
            ldd "$exe" | grep '/mingw64/bin/' | awk '{print $3}' | xargs -I{} cp -n {} artifacts/
          done

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: shadowsocks-libev-windows-x64
          path: artifacts/
          if-no-files-found: error

      - name: Upload all DLL files
        uses: actions/upload-artifact@v4
        with:
          name: dll-files
          path: |
            **/*.dll 
