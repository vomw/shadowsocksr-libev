name: Build Windows

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pcre
            mingw-w64-x86_64-zlib
            make
            autoconf
            automake
            libtool
            pkg-config
            git

      - name: Configure and Build
        run: |
          ./autogen.sh
          ./configure --disable-documentation CFLAGS="-g -O2 -Wno-error"
          make -j$(nproc)

      - name: Stage artifacts
        run: |
          git status
          mkdir -p artifacts
          cp src/ss-local.exe artifacts/

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: shadowsocks-libev-windows-x64
          path: src/*
          if-no-files-found: error
